version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: consent-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: consentdb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  consent-api:
    build: .
    container_name: consent-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/consentdb
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure

volumes:
  mongo_data: